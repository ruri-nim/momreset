<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Daily OK</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(180deg, #fff9b8 0%, #fff5bf 100%);
        color: #2a1f18;
        font-family: "Trebuchet MS", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      }

      .card {
        width: min(92vw, 420px);
        padding: 28px 24px;
        border-radius: 28px;
        border: 2px solid rgba(242, 193, 177, 0.95);
        background: rgba(255, 252, 242, 0.98);
        box-shadow: 0 18px 40px rgba(164, 116, 85, 0.12);
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: 28px;
      }

      p {
        margin: 14px 0 0;
        line-height: 1.65;
        color: #6f5747;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Daily OK</h1>
      <p>지금은 인터넷 연결이 잠시 없어요.</p>
      <p>연결이 돌아오면 다시 기록을 이어갈 수 있어요.</p>
    </div>
  </body>
</html>
